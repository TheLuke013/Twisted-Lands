    <style>
  :root {
    color-scheme: dark;
    --bg: #040b12;
    --bg-soft: #0b1927;
    --panel: rgba(8, 19, 31, 0.92);
    --panel-strong: rgba(13, 29, 47, 0.98);
    --text: #f2f7ff;
    --muted: #8ea4bb;
    --accent: #71e2ff;
    --accent-2: #b08aff;
    --border: rgba(255,255,255,0.1);
    --shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Inter, Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #2b1055 0%, #751111 100%);
    color: var(--text);
    min-height: 100vh;
  }

  .shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }

  .logo-header {
    display: flex;
    justify-content: center;
    padding: 20px 0 10px 0;
  }
  .brand-logo {
    width: 220px;
    max-width: 100%;
    display: block;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.25));
  }

  .content {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .page-panel {
    background: linear-gradient(135deg, var(--panel), var(--panel-strong));
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 24px 28px;
  }

  .page-panel h1, .page-panel h2, .page-panel h3, .page-panel h4 {
    color: var(--accent);
    margin-top: 0.5rem;
  }

  .page-panel p, .page-panel li, .page-panel blockquote, .page-panel figcaption {
    line-height: 1.7;
    color: var(--text);
  }

  .page-panel a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(113, 226, 255, 0.3);
    transition: border-color 0.2s;
  }

  .page-panel a:hover {
    border-bottom-color: var(--accent);
    text-decoration: none;
  }

  .image-item {
    display: inline-block;
    width: auto;
    max-width: 250px;
    margin: 10px;
    vertical-align: top;
  }

  .image-card {
    margin: 0;
    background: var(--panel-strong);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .image-card:hover {
    transform: translateY(-4px);
  }

  .image-card img {
    width: 100%;
    height: auto;
    max-width: 250px;
    display: block;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    -ms-interpolation-mode: nearest-neighbor;
  }

  .image-card figcaption {
    padding: 10px;
    text-align: center;
    font-size: 0.9rem;
    color: var(--muted);
  }

  .columns-container {
    display: flex;
    gap: 20px;
    margin: 20px 0;
    flex-wrap: wrap;
    justify-content: flex-start;
    align-items: flex-start;
  }

  .column {
    flex: 1;
    min-width: 200px;
  }

  .page-panel img {
    max-width: 100%;
    height: auto;
  }

  .page-panel blockquote {
    border-left: 4px solid var(--accent);
    padding-left: 14px;
    margin-left: 0;
    color: var(--muted);
  }

  .page-panel code {
    background: rgba(113, 226, 255, 0.12);
    padding: 2px 6px;
    border-radius: 6px;
    color: #bff6ff;
  }

  .page-panel ul, .page-panel ol {
    padding-left: 20px;
  }

  .page-panel hr {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  @media (max-width: 768px) {
    .image-item {
      max-width: 200px;
    }
    .image-card img {
      max-width: 200px;
    }
    .columns-container {
      flex-direction: column;
    }
  }

  @media (max-width: 480px) {
    .image-item {
      max-width: 150px;
    }
    .image-card img {
      max-width: 150px;
    }
  }
</style>
